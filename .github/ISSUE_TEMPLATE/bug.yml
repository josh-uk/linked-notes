name: Bug report
description: Report reproducible incorrect behaviour using synthetic data.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
