name: Scheduled maintenance

on:
  schedule:
    - cron: "41 5 * * 6"
  workflow_dispatch:

concurrency:
  group: scheduled-maintenance
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-validation:
    name: Full scheduled validation
    uses: ./.github/workflows/ci.yml
    with:
      source_sha: ${{ github.sha }}
