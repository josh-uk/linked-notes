name: linked-notes

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linked_notes}
      POSTGRES_USER: ${POSTGRES_USER:-linked_notes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks: [frontend, private]

  migrate:
    build:
      context: .
      target: migrate
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Copy .env.example to .env and set DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks: [private]

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    read_only: true
    init: true
    environment:
      DATABASE_URL: ${DATABASE_URL:?Copy .env.example to .env and set DATABASE_URL}
      ATTACHMENTS_DIR: /data/attachments
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-3000}:3000"
    volumes:
      - attachment_data:/data/attachments
    tmpfs:
      - /tmp:size=256m,mode=1777
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [frontend, private]

volumes:
  postgres_data:
  attachment_data:

networks:
  frontend:
  private:
    internal: true
